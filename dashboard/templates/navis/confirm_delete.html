{% extends "home/base.html" %}

{% block title %}Delete — {{ obj }}{% endblock %}

{% block content %}
<div style="max-width:480px;margin:60px auto;padding:0 16px;font-family:var(--ff-body);">
  <h1 style="font-size:20px;margin-bottom:12px;">Delete "{{ obj }}"?</h1>
  <p style="color:var(--c-text-muted);margin-bottom:24px;">This action cannot be undone.</p>
  <form method="post" style="display:flex;gap:10px;">
    {% csrf_token %}
    <button type="submit" style="padding:8px 18px;background:#dc2626;color:#fff;border:none;border-radius:6px;cursor:pointer;">Confirm delete</button>
    <a href="{% url 'navis:index' %}" style="padding:8px 18px;color:var(--c-text-muted);text-decoration:none;">Cancel</a>
  </form>
</div>
{% endblock %}
